<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YT Bookmarks - Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app-container">

        <div id="errorScreen" class="error-container hidden">
            <div class="error-icon">⚠️</div>
            <h4>Please open a YouTube video first 📺</h4>
            <p></p>
            <a href="https://youtube.com" target="_blank" class="btn btn-gradient text-center hidden">Go to YouTube
                🚀</a>
        </div>

        <div id="mainContent">
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="current-video">
                    <span class="tab-icon">📺</span> Current Video
                </button>
                <button class="tab-btn" data-tab="all-videos">
                    <span class="tab-icon">🗂️</span> Saved
                </button>
            </div>

            <div id="current-video" class="tab-content active">
                <div class="video-info-card">
                    <div class="pulse-indicator"></div>
                    <h3 id="videoTitle" class="video-title">Checking video...</h3>
                </div>

                <div class="add-bookmark-section">
                    <button id="addBookmarkBtn" class="main-action-btn">
                        <div class="icon-circle">📌</div>
                        <div class="btn-text">
                            <span class="primary-text">Add New Bookmark</span>
                            <span class="secondary-text">Save current timestamp automatically</span>
                        </div>
                    </button>
                </div>

                <div id="quickAddContainer" class="modern-card quick-add-card hidden">
                    <div class="card-header">
                        <span class="card-icon">⏱️</span>
                        <h4>Save bookmark at: <span id="capturedTimeBadge" class="badge">00:00</span></h4>
                    </div>
                    <div class="input-wrapper">
                        <label>Description or title for this moment</label>
                        <input type="text" id="customMarkerTitleInput" placeholder="Write a quick description...">
                    </div>
                    <div class="loop-actions">
                        <button id="saveCustomMarkerBtn" class="btn btn-gradient" style="flex: 2;">Save Now 💾</button>
                        <button id="cancelCustomMarkerBtn" class="btn btn-outline" style="flex: 1;">Cancel</button>
                    </div>
                </div>

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchMarker" placeholder="Search bookmarks in this video...">
                </div>

                <div class="modern-card loop-card">
                    <div class="card-header">
                        <span class="card-icon">🔄</span>
                        <h4>Repeat a scene (A-B Loop)</h4>
                    </div>
                    <div class="loop-grid">
                        <div class="input-wrapper">
                            <label>From (seconds or m:s)</label>
                            <input type="text" id="loopFrom" placeholder="0:00">
                        </div>
                        <div class="input-wrapper">
                            <label>To (seconds or m:s)</label>
                            <input type="text" id="loopTo" placeholder="1:30">
                        </div>
                        <div class="input-wrapper full-width">
                            <label>Repeat count</label>
                            <select id="loopCount">
                                <option value="1">Once</option>
                                <option value="2">Twice</option>
                                <option value="3">3 times</option>
                                <option value="5">5 times</option>
                                <option value="10">10 times</option>
                                <option value="infinite" selected>Infinite ∞</option>
                            </select>
                        </div>
                    </div>
                    <div class="loop-actions">
                        <button id="startLoopBtn" class="btn btn-gradient">Start Loop</button>
                        <button id="stopLoopBtn" class="btn btn-danger hidden">Stop Loop</button>
                    </div>
                </div>

                <div class="section-title">Bookmarks for this video</div>
                <div class="markers-scroll-container">
                    <ul id="markersList" class="modern-list"></ul>
                </div>

                <div class="backup-grid">
                    <button id="exportBtn" class="btn btn-outline">📥 Export Data</button>
                    <label for="importFile" class="btn btn-outline text-center">📤 Import File</label>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>

            <div id="all-videos" class="tab-content">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchSavedVideos" placeholder="Search saved videos...">
                </div>
                <div class="section-title">Videos with bookmarks</div>
                <div class="markers-scroll-container">
                    <ul id="allVideosList" class="modern-list video-history-list"></ul>
                </div>
            </div>
        </div>

    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
