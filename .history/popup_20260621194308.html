<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YT Bookmarks - Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app-container">

        <!-- رسالة الخطأ -->
        <div id="errorScreen" class="error-container hidden">
            <div class="error-icon">⚠️</div>
            <h4>من فضلك حدد فيديو فقط 📺</h4>
            <p></p>
            <a href="https://youtube.com" target="_blank" class="btn btn-gradient text-center hidden">الانتقال إلى منصة
                يوتيوب 🚀</a>
        </div>

        <!-- المحتوى الرئيسي -->
        <div id="mainContent">
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="current-video">
                    <span class="tab-icon">📺</span> الفيديو الحالي
                </button>
                <button class="tab-btn" data-tab="all-videos">
                    <span class="tab-icon">🗂️</span> المحفوظات
                </button>
            </div>

            <!-- التبويب الأول -->
            <div id="current-video" class="tab-content active">
                <div class="video-info-card">
                    <div class="pulse-indicator"></div>
                    <h3 id="videoTitle" class="video-title">جاري الفحص المباشر...</h3>
                </div>

                <!-- زر الإضافة -->
                <div class="add-bookmark-section">
                    <button id="addBookmarkBtn" class="main-action-btn">
                        <div class="icon-circle">📌</div>
                        <div class="btn-text">
                            <span class="primary-text">إضافة علامة مرجعية جديدة</span>
                            <span class="secondary-text">حفظ التوقيت الحالي تلقائيًا</span>
                        </div>
                    </button>
                </div>

                <!-- كارت الإضافة السريع -->
                <div id="quickAddContainer" class="modern-card quick-add-card hidden">
                    <div class="card-header">
                        <span class="card-icon">⏱️</span>
                        <h4>حفظ علامة عند توقيت: <span id="capturedTimeBadge" class="badge">00:00</span></h4>
                    </div>
                    <div class="input-wrapper">
                        <label>وصف أو عنوان اللحظة الحالية</label>
                        <input type="text" id="customMarkerTitleInput" placeholder="اكتب وصفاً سريعاً هنا...">
                    </div>
                    <div class="loop-actions">
                        <button id="saveCustomMarkerBtn" class="btn btn-gradient" style="flex: 2;">حفظ الآن 💾</button>
                        <button id="cancelCustomMarkerBtn" class="btn btn-outline" style="flex: 1;">إلغاء</button>
                    </div>
                </div>

                <!-- بحث -->
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchMarker" placeholder="ابحث في علامات هذا الفيديو...">
                </div>

                <!-- ميزة التكرار -->
                <div class="modern-card loop-card">
                    <div class="card-header">
                        <span class="card-icon">🔄</span>
                        <h4>تكرار لقطة معينة (A-B Loop)</h4>
                    </div>
                    <div class="loop-grid">
                        <div class="input-wrapper">
                            <label>من (ثواني أو د:ث)</label>
                            <input type="text" id="loopFrom" placeholder="0:00">
                        </div>
                        <div class="input-wrapper">
                            <label>إلى (ثواني أو د:ث)</label>
                            <input type="text" id="loopTo" placeholder="1:30">
                        </div>
                        <div class="input-wrapper full-width">
                            <label>مرات التكرار</label>
                            <select id="loopCount">
                                <option value="1">مرة واحدة</option>
                                <option value="2">مرتين</option>
                                <option value="3">3 مرات</option>
                                <option value="5">5 مرات</option>
                                <option value="10">10 مرات</option>
                                <option value="infinite" selected>بلا نهاية ∞</option>
                            </select>
                        </div>
                    </div>
                    <div class="loop-actions">
                        <button id="startLoopBtn" class="btn btn-gradient">تفعيل التكرار</button>
                        <button id="stopLoopBtn" class="btn btn-danger hidden">إيقاف التكرار</button>
                    </div>
                </div>

                <div class="section-title">العلامات المسجلة لهذا الفيديو</div>
                <div class="markers-scroll-container">
                    <ul id="markersList" class="modern-list"></ul>
                </div>

                <div class="backup-grid">
                    <button id="exportBtn" class="btn btn-outline">📥 تصدير البيانات</button>
                    <label for="importFile" class="btn btn-outline text-center">📤 استيراد ملف</label>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>

            <!-- التبويب الثاني -->
            <div id="all-videos" class="tab-content">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchSavedVideos" placeholder="ابحث باسم الفيديو المحفوظ...">
                </div>
                <div class="section-title">الفيديوهات التي تمتلك علامات</div>
                <div class="markers-scroll-container">
                    <ul id="allVideosList" class="modern-list video-history-list"></ul>
                </div>
            </div>
        </div>

    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
