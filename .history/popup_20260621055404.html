<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد علامات الفيديو</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app-container">

        <!-- التبويبات العلوية للتنقل -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="current-video">الفيديو الحالي</button>
            <button class="tab-btn" data-tab="all-videos">الفيديوهات المحفوظة</button>
        </div>

        <!-- التبويب الأول: الفيديو الحالي وعلاماته وتكرار اللقطات -->
        <div id="current-video" class="tab-content active">
            <h3 id="videoTitle" class="video-title">جاري التعرف على الفيديو...</h3>

            <!-- شريط البحث -->
            <div class="search-box">
                <input type="text" id="searchMarker" placeholder="ابحث في علامات هذا الفيديو...">
            </div>

            <!-- ميزة تحديد الفترة والتكرار (Loop) -->
            <div class="loop-section">
                <h4>تكرار لقطة معينة (A-B Loop)</h4>
                <div class="loop-inputs">
                    <input type="text" id="loopFrom" placeholder="من (0:00)">
                    <input type="text" id="loopTo" placeholder="إلى (1:00)">
                    <select id="loopCount">
                        <option value="1">مرة واحدة</option>
                        <option value="2">مرتين</option>
                        <option value="3">3 مرات</option>
                        <option value="5">5 مرات</option>
                        <option value="10">10 مرات</option>
                        <option value="infinite" selected>بلا نهاية ∞</option>
                    </select>
                </div>
                <div class="loop-controls">
                    <button id="startLoopBtn" class="btn btn-primary">تفعيل التكرار</button>
                    <button id="stopLoopBtn" class="btn btn-danger hidden">إيقاف</button>
                </div>
            </div>

            <!-- قائمة العلامات المرجعية -->
            <div class="markers-section">
                <ul id="markersList" class="markers-list"></ul>
                <div id="noMarkers" class="status-msg hidden">لا توجد علامات تطابق بحثك</div>
            </div>

            <!-- أزرار الاستيراد والتصدير -->
            <div class="backup-section">
                <button id="exportBtn" class="btn btn-secondary">تصدير البيانات (JSON)</button>
                <label for="importFile" class="btn btn-secondary-outline">استيراد ملف</label>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </div>

        <!-- التبويب الثاني: لوحة التحكم واستعراض كل الفيديوهات -->
        <div id="all-videos" class="tab-content">
            <h3>فيديوهات تحتوي على علامات مرجعية</h3>
            <ul id="allVideosList" class="all-videos-list"></ul>
            <div id="noVideos" class="status-msg hidden">لم تقم بإضافة علامات لأي فيديو بعد.</div>
        </div>

    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
