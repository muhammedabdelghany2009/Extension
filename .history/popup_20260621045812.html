<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>YouTube Bookmarker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="title">YouTube Bookmarker</div>

        <div class="backup-controls">
            <button id="export-btn" title="تصدير العلامات المرجعية لملف نصي">Export 📄</button>
            <button id="import-btn" title="استيراد علامات مرجعية من ملف">Import 📥</button>
            <input type="file" id="import-file-input" accept=".json" style="display: none;">
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search bookmarks...">
        </div>

        <div id="bookmarks" class="bookmarks"></div>
    </div>

    <script type="module" src="popup.js"></script>
</body>

</html>
