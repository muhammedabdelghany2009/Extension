<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد علامات الفيديو الاحترافي</title>
    <!-- استدعاء خط قوقل الاحترافي Cairo -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app-container">

        <!-- التبويبات العلوية للتنقل بأسلوب حديث -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="current-video">
                <span class="tab-icon">📺</span> الفيديو الحالي
            </button>
            <button class="tab-btn" data-tab="all-videos">
                <span class="tab-icon">🗂️</span> المحفوظات
            </button>
        </div>

        <!-- التبويب الأول: الفيديو الحالي وعلاماته -->
        <div id="current-video" class="tab-content active">
            <div class="video-info-card">
                <div class="pulse-indicator"></div>
                <h3 id="videoTitle" class="video-title">جاري التعرف على الفيديو النشط...</h3>
            </div>

            <!-- الزر الرئيسي لإضافة علامة مع اللوجو بتأثير تفاعلي -->
            <div class="add-bookmark-section">
                <button id="addBookmarkBtn" class="main-action-btn">
                    <div class="icon-circle">📌</div>
                    <div class="btn-text">
                        <span class="primary-text">إضافة علامة مرجعية جديدة</span>
                        <span class="secondary-text">حفظ اللحظة الحالية في الفيديو</span>
                    </div>
                </button>
            </div>

            <!-- شريط البحث العصري -->
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchMarker" placeholder="ابحث في علامات هذا الفيديو بسرعة...">
            </div>

            <!-- ميزة تحديد الفترة والتكرار (A-B Loop) بتصميم كارد منفصل -->
            <div class="modern-card loop-card">
                <div class="card-header">
                    <span class="card-icon">🔄</span>
                    <h4>تكرار لقطة معينة (A-B Loop)</h4>
                </div>
                <div class="loop-grid">
                    <div class="input-wrapper">
                        <label>من</label>
                        <input type="text" id="loopFrom" placeholder="0:00">
                    </div>
                    <div class="input-wrapper">
                        <label>إلى</label>
                        <input type="text" id="loopTo" placeholder="1:30">
                    </div>
                    <div class="input-wrapper full-width">
                        <label>مرات التكرار</label>
                        <select id="loopCount">
                            <option value="1">مرة واحدة</option>
                            <option value="2">مرتين</option>
                            <option value="3">3 مرات</option>
                            <option value="5">5 مرات</option>
                            <option value="10">10 مرات</option>
                            <option value="infinite" selected>بلا نهاية ∞</option>
                        </select>
                    </div>
                </div>
                <div class="loop-actions">
                    <button id="startLoopBtn" class="btn btn-gradient">تفعيل التكرار الذكي</button>
                    <button id="stopLoopBtn" class="btn btn-danger hidden">إيقاف التكرار</button>
                </div>
            </div>

            <!-- منطقة عرض العلامات المرجعية المحفوظة -->
            <div class="section-title">العلامات المسجلة</div>
            <div class="markers-scroll-container">
                <ul id="markersList" class="modern-list">
                    <!-- يتم توليدها ديناميكياً -->
                </ul>
                <div id="noMarkers" class="status-empty-msg hidden">
                    <span>💨</span> لا توجد علامات تطابق بحثك الحالي
                </div>
            </div>

            <!-- أزرار النسخ الاحتياطي العصرية -->
            <div class="backup-grid">
                <button id="exportBtn" class="btn btn-outline">
                    📥 تصدير البيانات (JSON)
                </button>
                <label for="importFile" class="btn btn-outline text-center">
                    📤 استيراد ملف محفوظ
                </label>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </div>

        <!-- التبويب الثاني: لوحة التحكم واستعراض كل الفيديوهات -->
        <div id="all-videos" class="tab-content">
            <div class="section-title">الفيديوهات المحفوظة مسبقاً</div>
            <div class="markers-scroll-container">
                <ul id="allVideosList" class="modern-list video-history-list">
                    <!-- يتم توليدها ديناميكياً -->
                </ul>
                <div id="noVideos" class="status-empty-msg hidden">
                    <span>📂</span> لم تقم بحفظ أي علامات لأي فيديو بعد.
                </div>
            </div>
        </div>

    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
